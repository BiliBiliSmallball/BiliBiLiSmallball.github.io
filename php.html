<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f0f23;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            overflow: hidden;
        }
        /* 背景粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }
        .title {
            font-size: 42px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 50px;
            letter-spacing: 8px;
            text-transform: uppercase;
        }
        .title span {
            color: #00d4ff;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 60px;
            letter-spacing: 2px;
        }
        .cards {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .card {
            width: 280px;
            height: 200px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #ffffff;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.15), 0 0 0 1px rgba(0, 212, 255, 0.2);
        }
        .card:hover::before {
            opacity: 1;
        }
        .card-icon {
            font-size: 48px;
            margin-bottom: 16px;
            transition: transform 0.3s;
        }
        .card:hover .card-icon {
            transform: scale(1.1);
        }
        .card-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .card-desc {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
        }
        .card-badge {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .footer {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            letter-spacing: 1px;
            z-index: 1;
        }
        @media (max-width: 640px) {
            .title {
                font-size: 28px;
                letter-spacing: 4px;
            }
            .cards {
                flex-direction: column;
                align-items: center;
            }
            .card {
                width: 260px;
                height: 160px;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>

    <div class="container">
        <h1 class="title">后台<span>管理</span></h1>
        <p class="subtitle">ADMIN DASHBOARD</p>

        <div class="cards">
            <a href="https://www.bilibili.com/video/BV1GJ411x7h7?spm_id_from=333.337.search-card.all.click&vd_source=8ee752fda8b652998ce7eefe20ba618b" class="card" target="_blank">
                <div class="card-badge"></div>
                <div class="card-icon">🎬</div>
                <div class="card-title">后台管理</div>
            </a>

            <a href="https://host.retiehe.com/" class="card" target="_blank">
                <div class="card-badge"></div>
                <div class="card-icon">⚙️</div>
                <div class="card-title">后台管理2</div>
                <div class="card-desc">Retiehe 主机管理平台</div>
            </a>

            <a href="https://github.com/BiliBiliSmallball/BiliBiLiSmallball.github.io/tree/main" class="card" target="_blank">
                <div class="card-badge"></div>
                <div class="card-icon">⚙️</div>
                <div class="card-title">我不是后台</div>
                <div class="card-desc">github</div>
            </a>

            <a href="https://github.com/BiliBiliSmallball/My-Blog_BaceOnHexo" class="card" target="_blank">
                <div class="card-badge"></div>
                <div class="card-icon">⚙️</div>
                <div class="card-title">config</div>
                <div class="card-desc">我不是数据库</div>
            </a>
        </div>
    </div>

    <div class="footer">SYSTEM STATUS: ONLINE</div>

    <script>
        // 生成背景粒子
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = (10 + Math.random() * 10) + 's';
            particlesContainer.appendChild(particle);
        }
    </script>
</body>
</html>
